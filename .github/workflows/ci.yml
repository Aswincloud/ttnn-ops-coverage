name: CI

# Runs on every push and PR. These are gates only — deployment is handled
# separately by Cloudflare Workers Builds (which runs `npm run build` +
# `wrangler deploy` on push). CI catches what CF won't: a CSV that parses but
# yields wrong totals, malformed columns, broken JS syntax, an un-reconciling
# data.js, or data.js accidentally committed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- data integrity: ops.csv shape + process.py reconciles --------------
  data:
    name: data integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # process.py is stdlib-only (csv/json/re) — no pip install needed.
      - name: Validate ops.csv + data.js reconciliation
        run: python3 scripts/check_data.py

  # ---- code: JS syntax + data.js boots + artifact not committed -----------
  code:
    name: code checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # data.js is gitignored, so the build must regenerate it before the
      # boot/reconcile check can read it.
      - name: Build data.js
        run: python3 process.py
      - name: Validate JS syntax + payload boot
        run: node scripts/check_code.mjs

  # ---- lint: eslint over the shipped JS -----------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dev deps
        run: npm ci
      - name: ESLint
        run: npm run lint
